<!--
  -------------------------------------------------
  COHERENT THEME: every page shares the same look, defined by the shared
  tokens in :root (matches the hub's beige-white). Change them in ONE place
  here if you want to restyle a page; keep them identical across pages to
  stay coherent.

  ICONS: both the home button and the header icon use img/title.png as a
  placeholder. Replace the src with your own icon files when ready, e.g.
     home button  -> img/home.png
     header icon  -> img/page-broadcast.png

  ADD CONTENT inside <main>.
  One-way navigation: the only way home is the icon (top-left).
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>media works</title>
<style>
  /* shared tokens — identical on every page for a coherent feel */
  :root {
    --bg: #fdfbf7;       /* same beige-white as the hub */
    --ink: #2b2b2b;
    --muted: #00000066;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh;
    background: var(--bg);
    color: var(--ink);
    font-family: ui-rounded, "Apple SD Gothic Neo", sans-serif;
    line-height: 1.6;
    /* custom cursor — add img/cursor.png later; falls back to auto if missing */
    cursor: url('img/cursor.png') 4 4, auto;
  }
  /* return-to-hub: only exit is back through the microwave */
  .home {
    position: fixed; top: 22px; left: 22px;
    width: 56px; height: 56px;
    display: grid; place-items: center;
    text-decoration: none;
    transition: transform .2s ease; z-index: 10;
  }
  .home { cursor: url('img/cursor.png') 4 4, pointer; }
  .home:hover { transform: scale(1.08); }
  .home img { width: 100%; height: 100%; object-fit: contain; }
  .home::after {
    content: "home"; position: absolute; left: 50%; top: 58px;
    transform: translateX(-50%); font-size: 11px;
    color: var(--muted); white-space: nowrap;
  }
  header { padding: 96px 24px 28px; text-align: center; }
  header .icon { width: 72px; height: 72px; margin: 0 auto; }
  header .icon img { width: 100%; height: 100%; object-fit: contain; }
  header h1 { margin: 14px 0 0; font-size: 36px; color: var(--ink); }
  main { max-width: 760px; margin: 0 auto; padding: 12px 24px 96px; }
  .placeholder {
    border: 2px dashed #00000022;
    border-radius: 16px; padding: 48px 24px;
    text-align: center; color: var(--muted);
    background: #ffffff66;
  }
  main img { max-width: 100%; border-radius: 12px; }
  a { color: var(--ink); }
</style>
</head>
<body>

<a class="home" href="index.html" aria-label="Back to the microwave">
  <img src="img/home.png" alt="home">
</a>

<header>
  <div class="icon"><img src="img/tv.png" alt=""></div>
  <h1>media works</h1>
</header>

<main>
  <!-- ADD YOUR CONTENT HERE -->
  <div class="placeholder">coming soon…</div>
</main>
</body>
</html>
